<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulario de Endoso — Corredora Ana Carolina Bizama</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --azul: #1a3a5c;
    --azul-mid: #1e5799;
    --azul-claro: #e8f0f8;
    --oro: #c9a84c;
    --oro-claro: #f5ecd5;
    --texto: #1c2535;
    --texto-mid: #4a5568;
    --texto-suave: #8a96a8;
    --borde: #d1dce8;
    --fondo: #f4f7fb;
    --blanco: #ffffff;
    --radio: 10px;
    --sombra: 0 4px 24px rgba(26,58,92,0.10);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--fondo);
    color: var(--texto);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .page {
    max-width: 780px;
    margin: 0 auto;
  }

  /* ---- HEADER ---- */
  .header {
    background: var(--azul);
    border-radius: 16px 16px 0 0;
    padding: 2rem 2.5rem 1.6rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    right: -40px; top: -40px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(201,168,76,0.10);
  }
  .header-izq h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.55rem;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }
  .header-izq .datos-corredora {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .header-izq .datos-corredora span {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.72);
    font-weight: 300;
    letter-spacing: 0.01em;
  }
  .header-izq .datos-corredora span strong {
    color: rgba(255,255,255,0.92);
    font-weight: 500;
  }
  .header-der {
    text-align: right;
    flex-shrink: 0;
  }
  .header-der label {
    display: block;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  .correlativo-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: flex-end;
  }
  .correlativo-prefix {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--oro);
    font-weight: 600;
  }
  #correlativo-num {
    width: 60px;
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--oro);
    font-weight: 600;
    background: transparent;
    border: none;
    border-bottom: 1.5px solid rgba(201,168,76,0.5);
    text-align: center;
    outline: none;
    padding: 0 2px;
  }
  #correlativo-num:focus { border-bottom-color: var(--oro); }

  /* ---- DIVIDER ---- */
  .sub-header {
    background: var(--azul-mid);
    padding: 0.7rem 2.5rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sub-header svg { opacity: 0.7; }
  .sub-header span {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.8);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 500;
  }

  /* ---- CARD ---- */
  .card {
    background: var(--blanco);
    padding: 2rem 2.5rem;
    border: 1px solid var(--borde);
    border-top: none;
  }
  .card:last-of-type {
    border-radius: 0 0 16px 16px;
  }

  /* ---- SECCIONES ---- */
  .seccion-titulo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.2rem;
  }
  .seccion-titulo .linea {
    flex: 1;
    height: 1px;
    background: var(--borde);
  }
  .seccion-titulo span {
    font-size: 0.72rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--azul);
    white-space: nowrap;
  }
  .seccion-titulo .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--oro);
    flex-shrink: 0;
  }

  /* ---- GRID ---- */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
  .grid-1 { display: grid; grid-template-columns: 1fr; gap: 1.2rem; }

  /* ---- CAMPOS ---- */
  .campo { display: flex; flex-direction: column; gap: 6px; }
  .campo label {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--texto-mid);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .campo label .req { color: var(--oro); margin-left: 2px; }

  .campo input,
  .campo select,
  .campo textarea {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--texto);
    background: var(--fondo);
    border: 1.5px solid var(--borde);
    border-radius: var(--radio);
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    width: 100%;
  }
  .campo input:focus,
  .campo select:focus,
  .campo textarea:focus {
    border-color: var(--azul-mid);
    background: #fff;
  }
  .campo textarea { resize: vertical; min-height: 110px; line-height: 1.6; }
  .campo select { appearance: none; cursor: pointer; }

  /* ---- SEPARADOR ---- */
  .separador { height: 1.5rem; }

  /* ---- BOTONES ---- */
  .acciones {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    padding-top: 1.5rem;
    border-top: 1px solid var(--borde);
    margin-top: 1.5rem;
  }
  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    border-radius: var(--radio);
    padding: 11px 22px;
    cursor: pointer;
    border: none;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-secundario {
    background: var(--fondo);
    color: var(--texto-mid);
    border: 1.5px solid var(--borde);
  }
  .btn-secundario:hover { background: #e4e9f0; }
  .btn-primario {
    background: var(--azul);
    color: #fff;
    box-shadow: 0 4px 16px rgba(26,58,92,0.22);
  }
  .btn-primario:hover { background: var(--azul-mid); transform: translateY(-1px); }
  .btn-primario:active { transform: translateY(0); }
  .btn svg { flex-shrink: 0; }

  /* ---- ALERTA ---- */
  .alerta {
    display: none;
    background: #fef3f2;
    border: 1.5px solid #fca5a5;
    border-radius: var(--radio);
    padding: 10px 16px;
    font-size: 0.88rem;
    color: #b91c1c;
    margin-top: 1rem;
  }

  /* ---- FOOTER ---- */
  .footer-form {
    background: var(--azul-claro);
    border: 1px solid var(--borde);
    border-top: none;
    border-radius: 0 0 16px 16px;
    padding: 0.9rem 2.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-form span {
    font-size: 0.75rem;
    color: var(--texto-suave);
  }
  .footer-form strong { color: var(--azul); }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 560px) {
    .header { flex-direction: column; gap: 1rem; }
    .header-der { text-align: left; }
    .correlativo-wrap { justify-content: flex-start; }
    .grid-2 { grid-template-columns: 1fr; }
    .card { padding: 1.5rem 1.2rem; }
    .header, .sub-header, .footer-form { padding-left: 1.2rem; padding-right: 1.2rem; }
  }

  .firma-cursiva {
    font-family: 'Dancing Script', cursive;
    font-size: 1.5rem;
    color: #1a3a5c;
    padding: 4px 0;
    display: block;
  }
</style>
</head>

<div class="page">

  <!-- ENCABEZADO -->
  <div class="header">
    <div class="header-izq">
      <h1>Corredora Ana Carolina Bizama</h1>
      <div class="datos-corredora">
        <span><strong>RUT:</strong> 9.224.096-7</span>
        <span><strong>Correo:</strong> <a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="127173607d7e7b7c733c707b68737f7352757f737b7e3c717d7f">[email&#160;protected]</a></span>
        <span><strong>Cel:</strong> +56 9 9436 5636</span>
      </div>
    </div>
    <div class="header-der">
      <label>N° Correlativo</label>
      <div class="correlativo-wrap">
        <span class="correlativo-prefix">2026 /</span>
        <input type="number" id="correlativo-num" value="1" min="1" max="9999">
      </div>
    </div>
  </div>

  <div class="sub-header">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span>Solicitud de Endoso de Seguro</span>
  </div>

  <!-- DATOS DEL ASEGURADO -->
  <div class="card">
    <div class="seccion-titulo">
      <div class="dot"></div>
      <span>Datos del Asegurado</span>
      <div class="linea"></div>
    </div>
    <div class="grid-2">
      <div class="campo">
        <label>Nombre Completo <span class="req">*</span></label>
        <input type="text" id="nombre" placeholder="Ej: Juan Pérez González">
      </div>
      <div class="campo">
        <label>RUT <span class="req">*</span></label>
        <input type="text" id="rut" placeholder="Ej: 12.345.678-9">
      </div>
    </div>

    <div class="separador"></div>

    <div class="seccion-titulo">
      <div class="dot"></div>
      <span>Datos de la Póliza</span>
      <div class="linea"></div>
    </div>
    <div class="grid-2">
      <div class="campo">
        <label>Compañía de Seguro <span class="req">*</span></label>
        <select id="compania">
          <option value="">Seleccionar compañía...</option>
          <option>Mapfre Chile</option>
          <option>Bci Seguros</option>
          <option>Consorcio</option>
          <option>Zurich Chile</option>
          <option>HDI Seguros</option>
          <option>Renta Nacional</option>
          <option>Otro</option>
        </select>
      </div>
      <div class="campo">
        <label>Número de Póliza</label>
        <input type="text" id="poliza" placeholder="Ej: POL-2024-00123">
      </div>
      <div class="campo" style="grid-column: 1 / -1;">
        <label>Vigencia de la Póliza</label>
        <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
          <input type="date" id="vigencia-desde" style="flex:1; min-width:140px;">
          <span style="font-size:13px; color:var(--texto-mid); white-space:nowrap;">al</span>
          <input type="date" id="vigencia-hasta" style="flex:1; min-width:140px;">
          <span id="vigencia-display" style="font-size:13px; color:var(--azul); font-weight:500; min-width:200px;"></span>
        </div>
      </div>
      <div class="campo">
        <label>Materia Asegurada</label>
        <input type="text" id="materia" placeholder="Ej: Vehículo, Hogar, Vida...">
      </div>
      <div class="campo">
        <label>Fecha de Solicitud <span class="req">*</span></label>
        <input type="date" id="fecha">
      </div>
      <div class="campo">
        <label>Tipo de Endoso <span class="req">*</span></label>
        <select id="tipo">
          <option value="">Seleccionar tipo...</option>
          <option>Modificación de cobertura</option>
          <option>Cambio de beneficiario</option>
          <option>Actualización de datos</option>
          <option>Inclusión de bien asegurado</option>
          <option>Exclusión de bien asegurado</option>
          <option>Cambio de suma asegurada</option>
          <option>Anulación de póliza</option>
          <option>Cancelación de póliza</option>
          <option>Corregir patente</option>
          <option>Cambiar forma de pago</option>
          <option>Otro</option>
        </select>
      </div>
    </div>

    <div class="separador"></div>

    <div class="seccion-titulo">
      <div class="dot"></div>
      <span>Detalle del Endoso</span>
      <div class="linea"></div>
    </div>
    <div class="grid-1">
      <div class="campo">
        <label>Descripción del Endoso <span class="req">*</span></label>
        <textarea id="descripcion" placeholder="Describa detalladamente los cambios o modificaciones solicitadas al contrato de seguro..."></textarea>
      </div>
      <div class="campo">
        <label>Observaciones Adicionales</label>
        <textarea id="observaciones" placeholder="Información adicional relevante (opcional)..." style="min-height:80px;"></textarea>
      </div>
    </div>

    <div id="alerta" class="alerta"></div>

    <div class="acciones">
      <button class="btn btn-secundario" onclick="limpiarForm()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
        Limpiar
      </button>
      <button class="btn btn-primario" onclick="generarPDF()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Descargar PDF
      </button>
    </div>
  </div>

  <div class="footer-form">
    <span>Los datos se procesan <strong>localmente</strong> en tu navegador.</span>
    <span id="fecha-hoy-display"></span>
  </div>

</div>

const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function fechaLarga(str) {
  const d = new Date(str + 'T12:00:00');
  return d.getDate() + ' de ' + MESES[d.getMonth()] + ' de ' + d.getFullYear();
}

function hoyLarga() {
  const d = new Date();
  return d.getDate() + ' de ' + MESES[d.getMonth()] + ' de ' + d.getFullYear();
}

const MESES_CORTOS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
function formatFechaCorta(str) {
  if (!str) return '';
  const d = new Date(str + 'T12:00:00');
  return String(d.getDate()).padStart(2,'0') + ' ' + MESES_CORTOS[d.getMonth()] + ' ' + d.getFullYear();
}

function formatRut(v) {
  v = v.replace(/[^0-9kK]/g,'');
  if (v.length < 2) return v;
  const dv = v.slice(-1);
  let num = v.slice(0,-1).replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  return num + '-' + dv.toUpperCase();
}

document.getElementById('rut').addEventListener('input', function(){ this.value = formatRut(this.value); });

function actualizarVigencia() {
  const d = document.getElementById('vigencia-desde').value;
  const h = document.getElementById('vigencia-hasta').value;
  const el = document.getElementById('vigencia-display');
  if (d && h) {
    el.textContent = formatFechaCorta(d) + ' al ' + formatFechaCorta(h);
  } else {
    el.textContent = '';
  }
}
document.getElementById('vigencia-desde').addEventListener('change', actualizarVigencia);
document.getElementById('vigencia-hasta').addEventListener('change', actualizarVigencia);
document.getElementById('fecha').valueAsDate = new Date();
document.getElementById('fecha-hoy-display').textContent = hoyLarga();

function limpiarForm() {
  ['nombre','rut','compania','poliza','fecha','tipo','descripcion','observaciones','vigencia-desde','vigencia-hasta','materia'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('vigencia-display').textContent = '';
  document.getElementById('fecha').valueAsDate = new Date();
  document.getElementById('alerta').style.display = 'none';
}

function mostrarAlerta(msg) {
  const el = document.getElementById('alerta');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

  doc.setFont('helvetica', 'bold');

  doc.setFontSize(7.5);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(180, 200, 225);
  doc.text('CORRELATIVO', W - M, 22, { align: 'right' });

  doc.text('Emitido el ' + hoyLarga(), W / 2, 51, { align: 'center' });

  let y = 68;

  function seccion(titulo) {
    doc.setFillColor(232, 240, 248);
    doc.rect(M, y - 5, CW, 9, 'F');
    doc.setFillColor(201, 168, 76);
    doc.rect(M, y - 5, 3, 9, 'F');
    doc.setFontSize(8.5);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(26, 58, 92);
    doc.text(titulo.toUpperCase(), M + 7, y + 1);
    y += 13;
  }

  function campo(label, value) {
    doc.setFontSize(8);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(120, 130, 145);
    doc.text(label.toUpperCase() + ':', M + 2, y);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(28, 37, 53);
    doc.text(value || '\u2014', M + 55, y);
    doc.setDrawColor(210, 220, 232);
    doc.setLineWidth(0.2);
    doc.line(M, y + 3.5, M + CW, y + 3.5);
    y += 12;
  }

  function campoTexto(label, value) {
    doc.setFontSize(8);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(120, 130, 145);
    doc.text(label.toUpperCase() + ':', M + 2, y);
    y += 6;
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(28, 37, 53);
    const lines = doc.splitTextToSize(value || '\u2014', CW - 4);
    doc.text(lines, M + 2, y);
    y += lines.length * 5.5 + 3;
    doc.setDrawColor(210, 220, 232);
    doc.setLineWidth(0.2);
    doc.line(M, y, M + CW, y);
    y += 7;

  seccion('Datos del Asegurado');

  campo('N\u00famero de p\u00f3liza', poliza || 'No indicado');
  if (vigencia) campo('Vigencia', vigencia);
  if (materia) campo('Materia asegurada', materia);
  campo('Fecha de solicitud', fechaLarga(fecha));
  campo('Tipo de endoso', tipo);
  y += 2;

  seccion('Detalle del Endoso');
  campoTexto('Descripci\u00f3n', descripcion);
  if (observaciones) campoTexto('Observaciones adicionales', observaciones);

  const firmaBaseY = Math.max(y + 8, 218);

  doc.setFont('helvetica', 'bolditalic');
  doc.setFontSize(13);
  doc.setTextColor(26, 58, 92);
  doc.text('Ana Carolina Bizama', W - M - 30, firmaBaseY + 14, { align: 'center' });

  doc.setFillColor(26, 58, 92);
  doc.rect(0, 280, W, 17, 'F');
  doc.setFillColor(201, 168, 76);
  doc.rect(0, 280, W, 1.5, 'F');

    doc.text('carolina.bizama@gmail.com  •  +56 9 9436 5636  •  ' + hoyLarga(), W / 2, 293, { align: 'center' });

  const pdfBlob = doc.output('blob');
  const url = URL.createObjectURL(pdfBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = archivo;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 100);
